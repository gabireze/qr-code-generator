# Configuração Nginx para qr-code.gabireze.cloud
# Salve este arquivo como: /etc/nginx/sites-available/qr-code.gabireze.cloud

# Redirecionar HTTP para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name qr-code.gabireze.cloud www.qr-code.gabireze.cloud;
    
    # Redirecionar para HTTPS
    return 301 https://qr-code.gabireze.cloud$request_uri;
}

# Redirecionar www para não-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.qr-code.gabireze.cloud;
    
    # Certificados SSL (ajuste os caminhos conforme sua configuração)
    ssl_certificate /etc/letsencrypt/live/qr-code.gabireze.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qr-code.gabireze.cloud/privkey.pem;
    
    return 301 https://qr-code.gabireze.cloud$request_uri;
}

# Configuração principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name qr-code.gabireze.cloud;
    
    # Diretório raiz do site
    root /var/www/qr-code.gabireze.cloud;
    index index.html;
    
    # Certificados SSL
    ssl_certificate /etc/letsencrypt/live/qr-code.gabireze.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qr-code.gabireze.cloud/privkey.pem;
    
    # Configurações SSL modernas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml;
    
    # Cache para assets estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public";
    }
    
    # HTML files (sem cache agressivo)
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Robots.txt e sitemap.xml
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
    
    location = /sitemap.xml {
        access_log off;
        log_not_found off;
    }
    
    # Manifest e service worker
    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600";
    }
    
    # Bloquear acesso a arquivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Página principal
    location / {
        try_files $uri $uri/ =404;
    }
    
    # Logs
    access_log /var/log/nginx/qr-code.gabireze.cloud.access.log;
    error_log /var/log/nginx/qr-code.gabireze.cloud.error.log;
}
