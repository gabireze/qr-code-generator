<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gerador de QR Code</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #151924;
      --muted: #9aa3b2;
      --text: #e6e9ef;
      --accent: #6aa9ff;
      --border: #23293a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji"; background: var(--bg); color: var(--text); }
    header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, #111522, #0f1115); position: sticky; top: 0; z-index: 10; }
    header h1 { margin: 0; font-weight: 700; font-size: 20px; }

    .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
    @media (max-width: 980px){ .container { grid-template-columns: 1fr; } }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.15); }
    .card h2 { margin: 0 0 12px; font-size: 16px; }

    .row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px; align-items: end; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); }
    .field input[type="text"], .field input[type="number"], .field input[type="color"], .field select, .field textarea {
      width: 100%; background: #0f1320; border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 12px; outline: none;
    }
    .field input[type="checkbox"] { transform: translateY(1px); }

    textarea { resize: vertical; min-height: 120px; }

    .help { font-size: 12px; color: var(--muted); }

    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    button, .btn {
      background: #10172a; color: var(--text); border: 1px solid var(--border); padding: 10px 14px; border-radius: 10px; cursor: pointer; font-weight: 600;
      transition: transform .06s ease, background .2s ease, border-color .2s ease;
    }
    button:hover, .btn:hover { background: #0f1530; border-color: #2b3350; }
    button:active, .btn:active { transform: translateY(1px); }

    .primary { background: var(--accent); color: #0c1220; border-color: transparent; }
    .primary:hover { filter: brightness(1.05); }

    .preview { display: grid; place-items: center; min-height: 420px; background: #0d1220; border: 1px dashed #273052; border-radius: 14px; }

    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (max-width: 580px){ .grid { grid-template-columns: 1fr; } }

    .pill { display: inline-block; padding: 4px 8px; font-size: 12px; border: 1px solid var(--border); border-radius: 999px; color: var(--muted); }

    .spacer { height: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>Gerador de QR Code • PNG, JPG, SVG, PDF</h1>
  </header>

  <main class="container">
    <!-- Configurações -->
    <section class="card">
      <h2>Configurações</h2>
      <div class="row" style="margin-bottom:14px;">
        <div class="field" style="grid-column: span 12;">
          <label for="content">Conteúdo</label>
          <textarea id="content" placeholder="Texto, URL, vCard, Wi‑Fi, etc."></textarea>
          <div class="help" id="sizeHint">Tamanho sugerido: 256 px • ECC M</div>
        </div>
      </div>

      <div class="row">
        <div class="field" style="grid-column: span 4;">
          <label for="presetSize">Tamanho predefinido</label>
          <select id="presetSize">
            <option value="256">256 px</option>
            <option value="384">384 px</option>
            <option value="512" selected>512 px</option>
            <option value="640">640 px</option>
            <option value="768">768 px</option>
            <option value="1024">1024 px</option>
          </select>
        </div>
        <div class="field" style="grid-column: span 4;">
          <label for="customW">Largura personalizada (px)</label>
          <input id="customW" type="number" min="64" step="1" placeholder="ex.: 600" />
        </div>
        <div class="field" style="grid-column: span 4;">
          <label for="margin">Margem (quiet zone, px)</label>
          <input id="margin" type="number" min="0" step="1" value="16" />
        </div>
      </div>

      <div class="spacer"></div>

      <div class="row">
        <div class="field" style="grid-column: span 3;">
          <label for="ecc">Correção de erro</label>
          <select id="ecc">
            <option value="L">L (Baixa)</option>
            <option value="M" selected>M (Média)</option>
            <option value="Q">Q (Alta)</option>
            <option value="H">H (Máxima)</option>
          </select>
        </div>
        <div class="field" style="grid-column: span 3;">
          <label>Forma dos módulos</label>
          <select id="shape">
            <option value="square" selected>Quadrados</option>
            <option value="dots">Pontos</option>
            <option value="rounded">Arredondado</option>
          </select>
        </div>
        <div class="field" style="grid-column: span 3;">
          <label for="fg">Cor do QR</label>
          <input id="fg" type="color" value="#000000" />
        </div>
        <div class="field" style="grid-column: span 3;">
          <label for="bg">Cor de fundo</label>
          <input id="bg" type="color" value="#ffffff" />
        </div>
      </div>

      <div class="spacer"></div>

      <div class="row">
        <div class="field" style="grid-column: span 4;">
          <label for="fileName">Nome do arquivo</label>
          <input id="fileName" type="text" placeholder="qrcode" value="qrcode" />
        </div>
        <div class="field" style="grid-column: span 4;">
          <label for="transparentBg">Fundo transparente (PNG/SVG)</label>
          <div>
            <input id="transparentBg" type="checkbox" />
          </div>
        </div>
        <div class="field" style="grid-column: span 4;">
          <label for="jpgBg">Fundo do JPG/PDF</label>
          <input id="jpgBg" type="color" value="#ffffff" />
        </div>
      </div>

      <div class="spacer"></div>

      <div class="actions">
        <button class="primary" id="btnGenerate">Gerar</button>
        <button id="btnClear">Limpar</button>
        <span class="pill" id="stats">0 caracteres</span>
      </div>
    </section>

    <!-- Prévia e Exportação -->
    <section class="card">
      <h2>Prévia e exportação</h2>
      <div class="preview" id="preview"></div>
      <div class="spacer"></div>
      <div class="grid">
        <button id="dlPng" class="btn">Baixar PNG</button>
        <button id="dlJpg" class="btn">Baixar JPG</button>
        <button id="dlSvg" class="btn">Baixar SVG</button>
        <button id="dlPdf" class="btn">Baixar PDF</button>
      </div>
    </section>
  </main>

  <!-- Dependências via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.5.0/dist/dom-to-image-more.min.js"></script>
  <script>
    // jsPDF via ESM UMD loader
    let jsPDF;
    (async () => {
      const mod = await import('https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js');
      jsPDF = mod.jsPDF;
    })();
  </script>

  <script>
    // UI Elements
    const el = (id) => document.getElementById(id);
    const content = el('content');
    const presetSize = el('presetSize');
    const customW = el('customW');
    const margin = el('margin');
    const ecc = el('ecc');
    const shape = el('shape');
    const fg = el('fg');
    const bg = el('bg');
    const jpgBg = el('jpgBg');
    const transparentBg = el('transparentBg');
    const fileName = el('fileName');
    const stats = el('stats');
    const sizeHint = el('sizeHint');
    const preview = el('preview');

    const btnGenerate = el('btnGenerate');
    const btnClear = el('btnClear');
    const dlPng = el('dlPng');
    const dlJpg = el('dlJpg');
    const dlSvg = el('dlSvg');
    const dlPdf = el('dlPdf');

    // Estado do QR
    let qr; // instância do QRCodeStyling

    const SHAPES = {
      square: { type: 'square' },
      dots: { type: 'dots' },
      rounded: { type: 'rounded' }
    };

    function getSizePx(){
      const custom = parseInt(customW.value, 10);
      if (!isNaN(custom) && custom > 0) return custom;
      return parseInt(presetSize.value, 10);
    }

    function suggestSize(textLen){
      // Heurística simples baseada no comprimento do conteúdo
      // Até 60 chars: 256, até 120: 384, até 200: 512, até 350: 640, acima: 768
      if (textLen <= 60) return 256;
      if (textLen <= 120) return 384;
      if (textLen <= 200) return 512;
      if (textLen <= 350) return 640;
      return 768;
    }

    function updateHints(){
      const len = (content.value || '').length;
      stats.textContent = `${len} caracteres`;
      const s = suggestSize(len);
      sizeHint.textContent = `Tamanho sugerido: ${s} px • ECC ${ecc.value}`;
    }

    function createOrUpdate(){
      const size = getSizePx();
      const quietZone = Math.max(0, parseInt(margin.value, 10) || 0);
      const foreground = fg.value || '#000000';
      const background = (transparentBg.checked) ? 'transparent' : (bg.value || '#ffffff');
      const modulesStyle = SHAPES[shape.value] || SHAPES.square;
      const data = content.value || '';

      const opts = {
        width: size,
        height: size,
        type: 'svg', // manter SVG como base para nítidez
        data: data,
        margin: quietZone,
        qrOptions: { errorCorrectionLevel: ecc.value },
        backgroundOptions: { color: background },
        dotsOptions: { color: foreground, type: modulesStyle.type },
        cornersSquareOptions: { color: foreground },
        cornersDotOptions: { color: foreground }
      };

      if (!qr){
        qr = new QRCodeStyling(opts);
        preview.innerHTML = '';
        const holder = document.createElement('div');
        holder.style.padding = '16px';
        preview.appendChild(holder);
        qr.append(holder);
      } else {
        qr.update(opts);
      }
    }

    function dataUrlToBlob(dataUrl){
      const [meta, base64] = dataUrl.split(',');
      const mime = /data:(.*?);base64/.exec(meta)[1];
      const bin = atob(base64);
      const len = bin.length;
      const buffer = new Uint8Array(len);
      for (let i=0;i<len;i++) buffer[i] = bin.charCodeAt(i);
      return new Blob([buffer], { type: mime });
    }

    async function download(type){
      if (!qr) createOrUpdate();
      const name = (fileName.value || 'qrcode').trim();

      if (type === 'svg'){
        const blob = await qr.getRawData('svg');
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${name}.svg`; a.click();
        URL.revokeObjectURL(url);
        return;
      }

      // Para bitmap, renderizamos em um nodo e usamos dom-to-image-more
      const node = preview.querySelector('div');
      const size = getSizePx();

      if (type === 'png'){
        const dataUrl = await domtoimage.toPng(node, { bgcolor: transparentBg.checked ? 'transparent' : bg.value, width: size + 32, height: size + 32, style: { transform: 'scale(1)', transformOrigin: 'top left' } });
        const a = document.createElement('a');
        a.href = dataUrl; a.download = `${name}.png`; a.click();
        return;
      }

      if (type === 'jpg'){
        const dataUrl = await domtoimage.toJpeg(node, { quality: 0.95, bgcolor: jpgBg.value || '#ffffff', width: size + 32, height: size + 32 });
        const a = document.createElement('a');
        a.href = dataUrl; a.download = `${name}.jpg`; a.click();
        return;
      }

      if (type === 'pdf'){
        // Gera PNG e insere no PDF no mesmo tamanho em pontos (1 px ~ 0.75 pt, mas vamos mapear 1:1 via jsPDF com unidade px)
        const dataUrl = await domtoimage.toPng(node, { bgcolor: jpgBg.value || '#ffffff', width: size + 32, height: size + 32 });
        const img = new Image();
        img.src = dataUrl;
        await img.decode();

        const pdf = new jsPDF({ orientation: 'p', unit: 'px', format: [img.width + 32, img.height + 32] });
        pdf.addImage(dataUrl, 'PNG', 16, 16, img.width, img.height);
        pdf.save(`${name}.pdf`);
        return;
      }
    }

    // Eventos
    ;['input','keyup','change'].forEach(evt => {
      content.addEventListener(evt, () => { updateHints(); });
    });

    ;[presetSize, customW, margin, ecc, shape, fg, bg, transparentBg].forEach(elm => {
      elm.addEventListener('change', () => { createOrUpdate(); updateHints(); });
      elm.addEventListener('input', () => { createOrUpdate(); updateHints(); });
    });

    jpgBg.addEventListener('input', () => { /* apenas exportação */ });

    btnGenerate.addEventListener('click', () => createOrUpdate());
    btnClear.addEventListener('click', () => {
      content.value = '';
      updateHints();
      createOrUpdate();
    });

    dlPng.addEventListener('click', () => download('png'));
    dlJpg.addEventListener('click', () => download('jpg'));
    dlSvg.addEventListener('click', () => download('svg'));
    dlPdf.addEventListener('click', () => download('pdf'));

    // Inicialização
    content.value = 'https://example.com';
    updateHints();
    createOrUpdate();
  </script>
</body>
</html>
