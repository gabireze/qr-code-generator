<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gerador de QR Code</title>
  <!-- Font Awesome (CDN) for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <!-- Header -->
  <header class="sticky top-0 z-10 border-b border-slate-800 bg-[linear-gradient(180deg,#111522,#0f1115)]">
    <div class="mx-auto max-w-6xl px-4 py-5 text-center">
      <h1 class="m-0 text-xl font-bold">Gerador de QR Code • PNG, JPG, SVG, PDF</h1>
    </div>
  </header>

  <main class="mx-auto my-6 max-w-6xl px-4 grid grid-cols-1 gap-4 lg:[grid-template-columns:1.4fr_1fr]" id="mainGrid">
    <!-- Configurações -->
    <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 shadow-[0_10px_30px_rgba(0,0,0,0.15)]">
      <h2 class="mb-3 text-base font-semibold">Configurações</h2>

      <!-- Seletor de Layout -->
      <div class="mb-3">
        <label class="mb-1 block text-xs text-slate-400">Layout da prévia</label>
        <div class="flex gap-2">
          <button type="button" id="layoutSide" class="flex items-center gap-2 px-3 py-2 rounded-xl bg-blue-500 text-white text-sm" title="QR Code ao lado (fixo 512px)">
            <i class="fa-solid fa-table-columns"></i>
            <span>Lado a lado</span>
          </button>
          <button type="button" id="layoutVertical" class="flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 text-slate-200 text-sm" title="QR Code abaixo (responsivo)">
            <i class="fa-solid fa-bars"></i>
            <span>Vertical</span>
          </button>
        </div>
      </div>

      <!-- Tipo de conteúdo -->
      <div class="mb-3">
        <label class="mb-1 block text-xs text-slate-400">Tipo de conteúdo</label>
        <!-- Hidden input kept so existing JS can use #contentType.value and change events -->
        <input id="contentType" type="hidden" value="free" />
        <!-- Icon toolbar (icon + text buttons) -->
        <div id="contentTypeGroup" class="flex flex-wrap gap-2">
            <button type="button" data-value="free" class="icon-btn flex items-center gap-2 px-3 py-2 rounded-xl bg-blue-500 text-white text-sm" title="Texto livre">
              <i class="fa-solid fa-font"></i>
              <span>Texto</span>
            </button>
            <button type="button" data-value="url" class="icon-btn flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 text-slate-200 text-sm" title="URL">
              <i class="fa-solid fa-link"></i>
              <span>URL</span>
            </button>
            <button type="button" data-value="tel" class="icon-btn flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 text-slate-200 text-sm" title="Telefone">
              <i class="fa-solid fa-phone"></i>
              <span>Telefone</span>
            </button>
            <button type="button" data-value="sms" class="icon-btn flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 text-slate-200 text-sm" title="SMS">
              <i class="fa-solid fa-message"></i>
              <span>SMS</span>
            </button>
            <button type="button" data-value="email" class="icon-btn flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 text-slate-200 text-sm" title="E-mail">
              <i class="fa-solid fa-envelope"></i>
              <span>E-mail</span>
            </button>
            <button type="button" data-value="wifi" class="icon-btn flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 text-slate-200 text-sm" title="Wi‑Fi">
              <i class="fa-solid fa-wifi"></i>
              <span>Wi-Fi</span>
            </button>
            <button type="button" data-value="vcard" class="icon-btn flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 text-slate-200 text-sm" title="vCard">
              <i class="fa-solid fa-id-card"></i>
              <span>vCard</span>
            </button>
            <button type="button" data-value="mecard" class="icon-btn flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 text-slate-200 text-sm" title="MeCard">
              <i class="fa-solid fa-address-card"></i>
              <span>MeCard</span>
            </button>
            <button type="button" data-value="geo" class="icon-btn flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 text-slate-200 text-sm" title="Localização">
              <i class="fa-solid fa-location-dot"></i>
              <span>Local</span>
            </button>
            <button type="button" data-value="event" class="icon-btn flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 text-slate-200 text-sm" title="Evento">
              <i class="fa-solid fa-calendar"></i>
              <span>Evento</span>
            </button>
            <button type="button" data-value="whatsapp" class="icon-btn flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 text-slate-200 text-sm" title="WhatsApp">
              <i class="fa-brands fa-whatsapp"></i>
              <span>WhatsApp</span>
            </button>
            <button type="button" data-value="pix" class="icon-btn flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 text-slate-200 text-sm" title="PIX">
              <i class="fa-solid fa-qrcode"></i>
              <span>PIX</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Builder dinâmico -->
      <div id="builder" class="mb-3 hidden"></div>

      <div class="mb-3 grid grid-cols-12 gap-3 items-end">
        <div class="col-span-12">
          <label for="content" class="mb-1 block text-xs text-slate-400">Conteúdo</label>
          <textarea id="content" placeholder="Texto, URL, vCard, Wi-Fi, etc." class="min-h-[120px] w-full resize-y rounded-xl border border-slate-800 bg-slate-950 px-3 py-2 text-sm outline-none"></textarea>
          <div id="sizeHint" class="mt-1 text-xs text-slate-400">Tamanho sugerido: 256 px • ECC M</div>
        </div>
      </div>

      <div class="grid grid-cols-12 gap-3 items-end">
        <div class="col-span-12 sm:col-span-4">
          <label for="presetSize" class="mb-1 block text-xs text-slate-400">Tamanho predefinido</label>
          <select id="presetSize" class="w-full rounded-xl border border-slate-800 bg-slate-950 px-3 py-2 text-sm outline-none">
            <option value="256">256 px</option>
            <option value="384">384 px</option>
            <option value="512" selected>512 px</option>
            <option value="640">640 px</option>
            <option value="768">768 px</option>
            <option value="1024">1024 px</option>
          </select>
        </div>
        <div class="col-span-12 sm:col-span-4">
          <label for="customW" class="mb-1 block text-xs text-slate-400">Largura personalizada (px)</label>
          <input id="customW" type="number" min="64" step="1" placeholder="ex.: 600" class="w-full rounded-xl border border-slate-800 bg-slate-950 px-3 py-2 text-sm outline-none" />
        </div>
        <div class="col-span-12 sm:col-span-4">
          <label for="margin" class="mb-1 block text-xs text-slate-400">Margem (quiet zone, px)</label>
          <input id="margin" type="number" min="0" step="1" value="16" class="w-full rounded-xl border border-slate-800 bg-slate-950 px-3 py-2 text-sm outline-none" />
        </div>
      </div>

      <div class="h-1.5"></div>

      <div class="grid grid-cols-12 gap-3 items-end">
        <div class="col-span-6 sm:col-span-3">
          <label for="ecc" class="mb-1 block text-xs text-slate-400">Correção de erro</label>
          <select id="ecc" class="w-full rounded-xl border border-slate-800 bg-slate-950 px-3 py-2 text-sm outline-none">
            <option value="L">L (Baixa)</option>
            <option value="M" selected>M (Média)</option>
            <option value="Q">Q (Alta)</option>
            <option value="H">H (Máxima)</option>
          </select>
        </div>
        <div class="col-span-6 sm:col-span-3">
          <label class="mb-1 block text-xs text-slate-400">Forma dos módulos</label>
          <select id="shape" class="w-full rounded-xl border border-slate-800 bg-slate-950 px-3 py-2 text-sm outline-none">
            <option value="square" selected>Quadrados</option>
            <option value="dots">Pontos</option>
            <option value="rounded">Arredondado</option>
          </select>
        </div>
        <div class="col-span-6 sm:col-span-3">
          <label for="fg" class="mb-1 block text-xs text-slate-400">Cor do QR</label>
          <input id="fg" type="color" value="#000000" class="h-10 w-full rounded-xl border border-slate-800 bg-slate-950 px-2 py-2" />
        </div>
        <div class="col-span-6 sm:col-span-3">
          <label for="bg" class="mb-1 block text-xs text-slate-400">Cor de fundo</label>
          <input id="bg" type="color" value="#ffffff" class="h-10 w-full rounded-xl border border-slate-800 bg-slate-950 px-2 py-2" />
        </div>
      </div>

      <div class="h-1.5"></div>

      <div class="grid grid-cols-12 gap-3 items-end">
        <div class="col-span-12 sm:col-span-4">
          <label for="fileName" class="mb-1 block text-xs text-slate-400">Nome do arquivo</label>
          <input id="fileName" type="text" placeholder="qrcode" value="qrcode" class="w-full rounded-xl border border-slate-800 bg-slate-950 px-3 py-2 text-sm outline-none" />
        </div>
        <div class="col-span-12 sm:col-span-4">
          <label for="transparentBg" class="mb-1 block text-xs text-slate-400">Fundo transparente (PNG/SVG)</label>
          <div>
            <input id="transparentBg" type="checkbox" class="h-4 w-4 align-middle" />
          </div>
        </div>
        <div class="col-span-12 sm:col-span-4">
          <label for="jpgBg" class="mb-1 block text-xs text-slate-400">Fundo do JPG/PDF</label>
          <input id="jpgBg" type="color" value="#ffffff" class="h-10 w-full rounded-xl border border-slate-800 bg-slate-950 px-2 py-2" />
        </div>
      </div>

      <div class="h-1.5"></div>

      <div class="flex flex-wrap items-center gap-2">
        <button id="btnGenerate" class="rounded-xl border border-transparent bg-blue-400 px-4 py-2 font-semibold text-slate-900 transition active:translate-y-px hover:brightness-105">Gerar</button>
        <button id="btnClear" class="rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 font-semibold transition hover:bg-slate-900 active:translate-y-px">Limpar</button>
        <span id="stats" class="inline-block rounded-full border border-slate-800 px-2 py-1 text-xs text-slate-400">0 caracteres</span>
      </div>
    </section>

    <!-- Prévia e Exportação -->
    <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 shadow-[0_10px_30px_rgba(0,0,0,0.15)]" id="previewSection">
      <h2 class="mb-3 text-base font-semibold">Prévia e exportação</h2>
      <div id="preview" class="grid place-items-center rounded-xl border border-dashed border-slate-700 bg-slate-950" style="min-height: 420px;"></div>
      <div class="h-1.5"></div>
      <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
        <button id="dlPng" class="rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 font-semibold transition hover:bg-slate-900 active:translate-y-px">Baixar PNG</button>
        <button id="dlJpg" class="rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 font-semibold transition hover:bg-slate-900 active:translate-y-px">Baixar JPG</button>
        <button id="dlSvg" class="rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 font-semibold transition hover:bg-slate-900 active:translate-y-px">Baixar SVG</button>
        <button id="dlPdf" class="rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 font-semibold transition hover:bg-slate-900 active:translate-y-px">Baixar PDF</button>
      </div>
    </section>
  </main>

  <!-- Dependências via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.5.0/dist/dom-to-image-more.min.js"></script>
  <script>
    // jsPDF via ESM/UMD loader
    let jsPDF;
    (async () => {
      try {
        const mod = await import('https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js');
        jsPDF = (mod && (mod.jsPDF || (mod.default && mod.default.jsPDF))) || (window.jspdf && window.jspdf.jsPDF) || window.jsPDF || window.jspdf;
        if (jsPDF && typeof jsPDF !== 'function' && jsPDF.default && typeof jsPDF.default === 'function') jsPDF = jsPDF.default;
        if (!jsPDF || typeof jsPDF !== 'function') { console.warn('jsPDF não expôs o construtor. PDF será desabilitado.'); jsPDF = null; }
      } catch (err) { console.warn('Falha ao carregar jsPDF:', err); jsPDF = null; }
    })();
  </script>

  <script>
    // UI Elements
    const el = (id) => document.getElementById(id);
  const contentType = el('contentType');
  const builder = el('builder');

  // Icon toolbar buttons for content type (keeps hidden #contentType in sync)
  const contentTypeButtons = document.querySelectorAll('#contentTypeGroup button');
  function setContentTypeValue(v){
    if (!contentType) return;
    contentType.value = v;
    // update active styles
    contentTypeButtons.forEach(b => {
      if (b.dataset.value === v){
        b.classList.remove('border','border-slate-800','bg-slate-950','text-slate-200');
        b.classList.add('bg-blue-500','text-white');
      } else {
        b.classList.remove('bg-blue-500','text-white');
        b.classList.add('border','border-slate-800','bg-slate-950','text-slate-200');
      }
    });
    contentType.dispatchEvent(new Event('change'));
  }
  contentTypeButtons.forEach(b => b.addEventListener('click', () => setContentTypeValue(b.dataset.value)));

  // Layout switcher
  const mainGrid = el('mainGrid');
  const previewSection = el('previewSection');
  const layoutSide = el('layoutSide');
  const layoutVertical = el('layoutVertical');
  let currentLayout = 'side'; // 'side' or 'vertical'
  
  function setLayout(layout){
    currentLayout = layout;
    if (layout === 'side'){
      // Layout lado a lado (padrão)
      mainGrid.className = 'mx-auto my-6 max-w-6xl px-4 grid grid-cols-1 gap-4 lg:[grid-template-columns:1.4fr_1fr]';
      preview.style.minHeight = '420px';
      layoutSide.classList.remove('border','border-slate-800','bg-slate-950','text-slate-200');
      layoutSide.classList.add('bg-blue-500','text-white');
      layoutVertical.classList.remove('bg-blue-500','text-white');
      layoutVertical.classList.add('border','border-slate-800','bg-slate-950','text-slate-200');
    } else {
      // Layout vertical (QR code abaixo)
      mainGrid.className = 'mx-auto my-6 max-w-6xl px-4 grid grid-cols-1 gap-4';
      preview.style.minHeight = 'auto';
      layoutVertical.classList.remove('border','border-slate-800','bg-slate-950','text-slate-200');
      layoutVertical.classList.add('bg-blue-500','text-white');
      layoutSide.classList.remove('bg-blue-500','text-white');
      layoutSide.classList.add('border','border-slate-800','bg-slate-950','text-slate-200');
    }
    createOrUpdate(); // Recria o QR para ajustar ao novo layout
  }
  
  layoutSide.addEventListener('click', () => setLayout('side'));
  layoutVertical.addEventListener('click', () => setLayout('vertical'));

    const content = el('content');
    const presetSize = el('presetSize');
    const customW = el('customW');
    const margin = el('margin');
    const ecc = el('ecc');
    const shape = el('shape');
    const fg = el('fg');
    const bg = el('bg');
    const jpgBg = el('jpgBg');
    const transparentBg = el('transparentBg');
    const fileName = el('fileName');
    const stats = el('stats');
    const sizeHint = el('sizeHint');
    const preview = el('preview');

    const btnGenerate = el('btnGenerate');
    const btnClear = el('btnClear');
    const dlPng = el('dlPng');
    const dlJpg = el('dlJpg');
    const dlSvg = el('dlSvg');
    const dlPdf = el('dlPdf');

    // Estado do QR
    let qr; // instância do QRCodeStyling

    const SHAPES = { square: { type: 'square' }, dots: { type: 'dots' }, rounded: { type: 'rounded' } };

    function getSizePx(){
      const custom = parseInt(customW.value, 10);
      if (!isNaN(custom) && custom > 0) return custom;
      return parseInt(presetSize.value, 10);
    }

    function suggestSize(textLen){
      if (textLen <= 60) return 256;
      if (textLen <= 120) return 384;
      if (textLen <= 200) return 512;
      if (textLen <= 350) return 640;
      return 768;
    }

    function updateHints(){
      const len = (content.value || '').length;
      stats.textContent = `${len} caracteres`;
      const s = suggestSize(len);
      sizeHint.textContent = `Tamanho sugerido: ${s} px • ECC ${ecc.value}`;
    }

    function createOrUpdate(){
      const size = getSizePx();
      const quietZone = Math.max(0, parseInt(margin.value, 10) || 0);
      const foreground = fg.value || '#000000';
      const background = (transparentBg.checked) ? 'transparent' : (bg.value || '#ffffff');
      const modulesStyle = SHAPES[shape.value] || SHAPES.square;
      const data = content.value || '';

      // No layout lado a lado, força preview em 512px (mas download mantém o tamanho selecionado)
      const previewSize = (currentLayout === 'side') ? 512 : size;

      const opts = {
        width: previewSize,
        height: previewSize,
        type: 'svg',
        data,
        margin: quietZone,
        qrOptions: { errorCorrectionLevel: ecc.value },
        backgroundOptions: { color: background },
        dotsOptions: { color: foreground, type: modulesStyle.type },
        cornersSquareOptions: { color: foreground },
        cornersDotOptions: { color: foreground }
      };

      if (!qr){
        qr = new QRCodeStyling(opts);
        preview.innerHTML = '';
        const holder = document.createElement('div');
        holder.className = 'p-4';
        preview.appendChild(holder);
        qr.append(holder);
      } else {
        qr.update(opts);
      }
    }

    async function blobToDataURL(blob){
      return new Promise((resolve) => { const r = new FileReader(); r.onload = () => resolve(r.result); r.readAsDataURL(blob); });
    }

    async function pngBlobToJpegDataUrl(pngBlob, bgColor = '#ffffff', quality = 0.95){
      const pngUrl = URL.createObjectURL(pngBlob);
      const img = new Image();
      img.src = pngUrl; await img.decode();
      const canvas = document.createElement('canvas');
      canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = bgColor; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img, 0, 0);
      const jpegUrl = canvas.toDataURL('image/jpeg', quality);
      URL.revokeObjectURL(pngUrl);
      return jpegUrl;
    }

    async function download(type){
      if (!qr) createOrUpdate();
      const name = (fileName.value || 'qrcode').trim();
      
      // Sempre usa o tamanho configurado pelo usuário para download (não o da preview)
      const downloadSize = getSizePx();
      const quietZone = Math.max(0, parseInt(margin.value, 10) || 0);
      const foreground = fg.value || '#000000';
      const background = (transparentBg.checked) ? 'transparent' : (bg.value || '#ffffff');
      const modulesStyle = SHAPES[shape.value] || SHAPES.square;
      const data = content.value || '';
      
      // Cria uma instância temporária com o tamanho real para download
      const downloadQr = new QRCodeStyling({
        width: downloadSize,
        height: downloadSize,
        type: 'svg',
        data,
        margin: quietZone,
        qrOptions: { errorCorrectionLevel: ecc.value },
        backgroundOptions: { color: background },
        dotsOptions: { color: foreground, type: modulesStyle.type },
        cornersSquareOptions: { color: foreground },
        cornersDotOptions: { color: foreground }
      });

      if (type === 'svg'){
        const blob = await downloadQr.getRawData('svg');
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `${name}.svg`; a.click();
        URL.revokeObjectURL(url);
        return;
      }

      // Gere a imagem diretamente da lib para evitar capturar bordas/gradientes do preview
      // Mantém o mesmo tamanho configurado
      const pngBlob = await downloadQr.getRawData('png');

      if (type === 'png'){
        const url = URL.createObjectURL(pngBlob);
        const a = document.createElement('a'); a.href = url; a.download = `${name}.png`; a.click();
        URL.revokeObjectURL(url);
        return;
      }

      if (type === 'jpg'){
        const dataUrl = await pngBlobToJpegDataUrl(pngBlob, jpgBg.value || '#ffffff', 0.95);
        const a = document.createElement('a'); a.href = dataUrl; a.download = `${name}.jpg`; a.click();
        return;
      }

      if (type === 'pdf'){
        // Converte o PNG gerado pela lib para PDF, com fundo controlado
        const pngDataUrl = await blobToDataURL(pngBlob);
        const img = new Image(); img.src = pngDataUrl; await img.decode();
        if (!jsPDF || typeof jsPDF !== 'function') { alert('Export para PDF indisponível: jsPDF não foi carregado corretamente. Atualize a página e tente novamente.'); return; }
        const marginPx = 16; // margem visual no PDF
        const pdfW = img.width + marginPx * 2; const pdfH = img.height + marginPx * 2;
        const pdf = new jsPDF({ orientation: 'p', unit: 'px', format: [pdfW, pdfH] });
        // pinta o fundo
        pdf.setFillColor(jpgBg.value || '#ffffff');
        pdf.rect(0, 0, pdfW, pdfH, 'F');
        pdf.addImage(pngDataUrl, 'PNG', marginPx, marginPx, img.width, img.height);
        pdf.save(`${name}.pdf`);
        return;
      }
    }

    // ====== Builders ======
    function esc(s=''){ return String(s ?? '').trim(); }

    function renderFields(fields){
      if (!fields || !fields.length){ builder.classList.add('hidden'); builder.innerHTML=''; return; }
      builder.classList.remove('hidden');
      const rows = fields.map(f => {
        const base = 'w-full rounded-xl border border-slate-800 bg-slate-950 px-3 py-2 text-sm outline-none';
        const col = f.col || 'col-span-12 sm:col-span-6';
        let input='';
        if (f.type === 'select'){
          input = `<select id="${f.id}" class="${base}">${f.options.map(o=>`<option value="${o.value}">${o.label}</option>`).join('')}</select>`;
        } else if (f.type === 'checkbox'){
          input = `<input id="${f.id}" type="checkbox" class="h-4 w-4 align-middle" ${f.value? 'checked':''} />`;
        } else if (f.type === 'datetime-local'){
          input = `<input id="${f.id}" type="datetime-local" class="${base}" />`;
        } else {
          input = `<input id="${f.id}" type="${f.type||'text'}" placeholder="${f.placeholder||''}" class="${base}" />`;
        }
        return `<div class="${col}"><label class="mb-1 block text-xs text-slate-400" for="${f.id}">${f.label}</label>${input}</div>`;
      }).join('');
      builder.innerHTML = `<div class="grid grid-cols-12 gap-3 items-end">${rows}</div>`;
    }

    function addListenersTo(ids, onChange){ ids.forEach(id => { const x = el(id); if (!x) return; ['input','change'].forEach(evt => x.addEventListener(evt, onChange)); }); }

  function setPayload(payload){ content.value = payload; updateHints(); createOrUpdate(); }

    function buildByType(){
      const t = contentType.value;
      if (t === 'free'){ builder.classList.add('hidden'); return; }
      const get = (id) => el(id)?.value;
      const getChecked = (id) => !!el(id)?.checked;
      let payload='';
      switch(t){
        case 'url': payload = esc(get('url_input')); break;
        case 'tel': payload = `tel:${esc(get('tel_number'))}`; break;
        case 'sms': {
          const n = esc(get('sms_number')); const m = esc(get('sms_text'));
          payload = m ? `SMSTO:${n}:${m}` : `SMSTO:${n}`; break;
        }
        case 'email': {
          const to = esc(get('mail_to')); const subj = encodeURIComponent(esc(get('mail_subject')));
          const body = encodeURIComponent(esc(get('mail_body')));
          const qs = (subj||body)?`?${subj?`subject=${subj}`:''}${subj&&body?'&':''}${body?`body=${body}`:''}`:'';
          payload = `mailto:${to}${qs}`; break;
        }
        case 'wifi': {
          const ssid = esc(get('wifi_ssid')); const pwd = esc(get('wifi_pwd'));
          const auth = esc(get('wifi_auth')) || 'WPA';
          const hidden = getChecked('wifi_hidden') ? 'true' : '';
          payload = `WIFI:T:${auth};S:${ssid};${pwd?`P:${pwd};`:''}${hidden?`H:${hidden};`:''};`;
          break;
        }
        case 'vcard': {
          const n = esc(get('vc_name')); const org = esc(get('vc_org')); const title = esc(get('vc_title'));
          const tel = esc(get('vc_tel')); const email = esc(get('vc_email'));
          const url = esc(get('vc_url')); const addr = esc(get('vc_addr'));
          payload = [
            'BEGIN:VCARD','VERSION:3.0',
            n?`FN:${n}`:'', org?`ORG:${org}`:'', title?`TITLE:${title}`:'',
            tel?`TEL;TYPE=CELL:${tel}`:'', email?`EMAIL:${email}`:'', url?`URL:${url}`:'', addr?`ADR;TYPE=WORK:${addr}`:'',
            'END:VCARD'
          ].filter(Boolean).join('\n');
          break;
        }
        case 'mecard': {
          const n = esc(get('mc_name')); const tel = esc(get('mc_tel')); const email = esc(get('mc_email')); const url = esc(get('mc_url'));
          const addr = esc(get('mc_addr'));
          payload = `MECARD:${n?`N:${n};`:''}${tel?`TEL:${tel};`:''}${email?`EMAIL:${email};`:''}${url?`URL:${url};`:''}${addr?`ADR:${addr};`:''};`;
          break;
        }
        case 'geo': {
          const lat = esc(get('geo_lat')); const lng = esc(get('geo_lng')); const q = esc(get('geo_q')); const z = esc(get('geo_z'));
          const base = `geo:${lat},${lng}`; const qs = q||z ? `?${q?`q=${encodeURIComponent(q)}`:''}${q&&z?'&':''}${z?`z=${z}`:''}` : '';
          payload = base + qs; break;
        }
        case 'event': {
          const summary = esc(get('ev_summary')); const loc = esc(get('ev_loc')); const desc = esc(get('ev_desc'));
          const start = esc(get('ev_start')); const end = esc(get('ev_end'));
          const dt = (s)=> s? s.replace(/[-:]/g, '').replace('.000','').replace('T','T')+'Z' : '';
          payload = [
            'BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',
            start?`DTSTART:${dt(start)}`:'', end?`DTEND:${dt(end)}`:'',
            summary?`SUMMARY:${summary}`:'', loc?`LOCATION:${loc}`:'', desc?`DESCRIPTION:${desc}`:'',
            'END:VEVENT','END:VCALENDAR'
          ].filter(Boolean).join('\n');
          break;
        }
        case 'whatsapp': {
          const n = esc(get('wa_number')).replace(/\D/g,''); const m = encodeURIComponent(esc(get('wa_text')));
          payload = `https://wa.me/${n}${m?`?text=${m}`:''}`; break;
        }
        case 'pix': {
          const chave = esc(get('pix_chave')); const nome = esc(get('pix_nome')); const cidade = esc(get('pix_cidade')) || 'SAO PAULO';
          const valor = esc(get('pix_valor')); const ref = esc(get('pix_ref')); const msg = esc(get('pix_msg'));
          payload = buildPix({ chave, nome, cidade, valor, ref, msg });
          break;
        }
      }
  setPayload(payload);
    }

    // PIX EMV builder
    function emv(tag, value){ const val = String(value ?? ''); const len = String(val.length).padStart(2,'0'); return `${tag}${len}${val}`; }
    function crc16(payload){
      let crc = 0xFFFF; for (let i=0;i<payload.length;i++){ crc ^= payload.charCodeAt(i) << 8; for (let j=0;j<8;j++){ crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) : (crc << 1); crc &= 0xFFFF; } }
      return crc.toString(16).toUpperCase().padStart(4,'0');
    }
    function buildPix({ chave, nome, cidade, valor, ref, msg }){
      const gui = emv('00','br.gov.bcb.pix');
      const k = emv('01', chave);
      const d = msg ? emv('02', msg.substring(0,50)) : '';
      const mai = emv('26', gui + k + d);
      const pfi = emv('00','01');
      const pim = emv('01','11'); // estático
      const mcc = emv('52','0000');
      const curr = emv('53','986');
      const amt = valor ? emv('54', String(Number(valor)).replace(',', '.')) : '';
      const ccode = emv('58','BR');
      const mname = emv('59', (nome||'RECEBEDOR').substring(0,25));
      const mcity = emv('60', (cidade||'SAO PAULO').substring(0,15).toUpperCase());
      const addData = emv('62', (ref? emv('05', ref.substring(0,25)) : emv('05','***')));
      let base = pfi + pim + mai + mcc + curr + amt + ccode + mname + mcity + addData + '6304';
      const crc = crc16(base);
      return base + crc;
    }

    function renderBuilderByType(){
      const t = contentType.value;
      // When using builder forms (not 'free'), lock manual editing of the content textarea
      content.readOnly = (t !== 'free');
      if (t === 'free'){ renderFields([]); return; }
      const F = [];
      if (t === 'url') F.push({id:'url_input', label:'URL', placeholder:'https://exemplo.com'});
      if (t === 'tel') F.push({id:'tel_number', label:'Telefone', placeholder:'+55XXXXXXXXXXX'});
      if (t === 'sms') F.push({id:'sms_number', label:'Telefone', placeholder:'+55XXXXXXXXXXX'},{id:'sms_text', label:'Mensagem', placeholder:'Texto da SMS'});
      if (t === 'email') F.push({id:'mail_to', label:'Para', placeholder:'usuario@dominio.com'},{id:'mail_subject', label:'Assunto'},{id:'mail_body', label:'Corpo'});
      if (t === 'wifi') F.push(
        {id:'wifi_auth', label:'Autenticação', type:'select', options:[{value:'WPA',label:'WPA/WPA2'},{value:'WEP',label:'WEP'},{value:'nopass',label:'Sem senha'}], col:'col-span-12 sm:col-span-4'},
        {id:'wifi_ssid', label:'SSID', col:'col-span-12 sm:col-span-4'},
        {id:'wifi_pwd', label:'Senha', col:'col-span-12 sm:col-span-4'},
        {id:'wifi_hidden', label:'Rede oculta', type:'checkbox', col:'col-span-12 sm:col-span-3'}
      );
      if (t === 'vcard') F.push({id:'vc_name', label:'Nome completo'},{id:'vc_org', label:'Empresa'},{id:'vc_title', label:'Cargo'},{id:'vc_tel', label:'Telefone'},{id:'vc_email', label:'E-mail'},{id:'vc_url', label:'Site/URL'},{id:'vc_addr', label:'Endereço'});
      if (t === 'mecard') F.push({id:'mc_name', label:'Nome'},{id:'mc_tel', label:'Telefone'},{id:'mc_email', label:'E-mail'},{id:'mc_url', label:'URL'},{id:'mc_addr', label:'Endereço'});
      if (t === 'geo') F.push({id:'geo_lat', label:'Latitude'},{id:'geo_lng', label:'Longitude'},{id:'geo_q', label:'Busca/label (opcional)'},{id:'geo_z', label:'Zoom (1-20, opcional)'});
      if (t === 'event') F.push({id:'ev_summary', label:'Título'},{id:'ev_loc', label:'Local'},{id:'ev_desc', label:'Descrição'},{id:'ev_start', label:'Início (UTC)', type:'datetime-local'},{id:'ev_end', label:'Fim (UTC)', type:'datetime-local'});
      if (t === 'whatsapp') F.push({id:'wa_number', label:'Número (com DDI)', placeholder:'55XXXXXXXXXXX'},{id:'wa_text', label:'Mensagem'});
      if (t === 'pix') F.push({id:'pix_chave', label:'Chave PIX'},{id:'pix_nome', label:'Nome do recebedor'},{id:'pix_cidade', label:'Cidade'},{id:'pix_valor', label:'Valor (opcional)', placeholder:'0.00'},{id:'pix_ref', label:'Identificador (opcional)'},{id:'pix_msg', label:'Mensagem (opcional)'});
      renderFields(F);
      addListenersTo(F.map(x=>x.id), buildByType);
      buildByType();
    }

    // Eventos
    ;['input','keyup','change'].forEach(evt => { content.addEventListener(evt, () => { updateHints(); }); });
    contentType.addEventListener('change', renderBuilderByType);
  // no manual lock option anymore; form builder always sets the content when in a form type

    ;[presetSize, customW, margin, ecc, shape, fg, bg, transparentBg].forEach(elm => {
      elm.addEventListener('change', () => { createOrUpdate(); updateHints(); });
      elm.addEventListener('input', () => { createOrUpdate(); updateHints(); });
    });

    jpgBg.addEventListener('input', () => {});
    btnGenerate.addEventListener('click', () => createOrUpdate());
    btnClear.addEventListener('click', () => { content.value = ''; updateHints(); createOrUpdate(); });
    dlPng.addEventListener('click', () => download('png'));
    dlJpg.addEventListener('click', () => download('jpg'));
    dlSvg.addEventListener('click', () => download('svg'));
    dlPdf.addEventListener('click', () => download('pdf'));

    // Inicialização
    content.value = 'https://example.com';
    updateHints();
    renderBuilderByType();
    createOrUpdate();
  </script>
